    <circle cx="0" cy="0" r="1.5" fill="#00ff41" stroke="none"/>
  </g>
  <!-- NTZ text -->
  <text x="16" y="28" text-anchor="middle" fill="#00ff41" font-family="Arial,sans-serif" font-size="6" font-weight="700" opacity="0.7">NTZ</text>
</svg>
