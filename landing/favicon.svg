<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <g transform="translate(16,18)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round">
    <!-- gauge arc -->
    <path d="M-10,4 A12,12 0 0,1 10,4" opacity="0.4"/>
    <path d="M-10,4 A12,12 0 0,1 0,-10" stroke-width="2.5"/>
    <!-- needle -->
